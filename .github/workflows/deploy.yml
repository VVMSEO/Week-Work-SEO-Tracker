name: Deploy to GitHub Pages

on:
  # Запускать деплой при каждом пуше в ветку main
  push:
    branches: ["main"]
  # Позволяет запускать workflow вручную из вкладки Actions
  workflow_dispatch:

# Настройка прав доступа для токена GITHUB_TOKEN
permissions:
  contents: read
  pages: write
  id-token: write

# Отмена параллельных деплоев (чтобы старый билд не перезаписал новый)
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Сборка проекта
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Папка, которую собирает Vite
          path: './dist'

  # Деплой собранного артефакта на GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
